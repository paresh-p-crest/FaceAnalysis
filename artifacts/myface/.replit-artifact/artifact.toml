kind = "web"
previewPath = "/healthz"
title = "MyFace"
version = "1.0.0"
id = "artifacts/myface"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 3000

[services.development]
run = "pnpm --filter @workspace/myface run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/myface", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/myface", "run", "start:prod" ]

[services.env]
PORT = "3000"
BASE_PATH = "/"
